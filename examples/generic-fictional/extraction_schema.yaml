schema_version: "1.0"
fields:
  study.design: {type: string, required: true, missing_value: not_reported, description: Reported design, evidence_requirement: quote}
  sample.material: {type: string, required: true, missing_value: not_reported, description: Fictional material sample, evidence_requirement: quote}
  condition.level: {type: number, required: false, missing_value: not_reported, description: Configured condition level, evidence_requirement: quote}
  outcomes:
    type: list
    required: true
    item_schema:
      domain: {type: string, required: true}
      direction: {type: enum, values: [increase, decrease, no_change, mixed, unclear], required: true}
      evidence_quote: {type: string, required: true}
matrix: {columns: [publication_id, study_id, study.design, sample.material, condition.level, outcome_domains, evidence_direction, quote_validation_status]}
contradiction_analysis: {claim_dimensions: [outcome.domain, sample.material], moderator_candidates: [condition.level, study.design]}
