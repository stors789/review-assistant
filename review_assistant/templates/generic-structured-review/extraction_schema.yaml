schema_version: "1.0"
fields:
  study.design:
    type: string
    required: true
    missing_value: not_reported
    description: Study design as reported by the publication
    extraction_instruction: Extract only explicitly reported information
    evidence_requirement: quote
  population.summary:
    type: string
    required: true
    missing_value: not_reported
    description: Population or sample summary
    evidence_requirement: quote
  outcomes:
    type: list
    required: true
    missing_value: not_reported
    item_schema:
      domain: {type: string, required: true}
      direction: {type: enum, values: [increase, decrease, no_change, mixed, unclear], required: true}
      evidence_quote: {type: string, required: true}
      page: {type: string, required: false}
outcome_schema:
  domain: {type: string, required: true}
  effect_direction: {type: enum, values: [increase, decrease, no_change, mixed, unclear], required: true}
  support_relation: {type: enum, values: [supports, contradicts, neutral, mixed, unclear], required: true}
  evidence:
    type: list
    required: true
    item_schema:
      quote: {type: string, required: true, validation_rule: {pattern: ".+"}}
      page: {type: string, required: false}
      section: {type: string, required: false}
      figure: {type: string, required: false}
      table: {type: string, required: false}
matrix:
  columns: [publication_id, study_id, study.design, population.summary, outcome_domains, effect_directions, support_relations, quote_validation_status]
contradiction_analysis:
  claim_dimensions: [outcome.domain]
  moderator_candidates: [study.design]
